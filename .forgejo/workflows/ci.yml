name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Rust)
    runs-on: docker
    container:
      image: rust:1.95-slim-bookworm
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: vuxe
          POSTGRES_PASSWORD: vuxe
          POSTGRES_DB: vuxe_test
    env:
      DATABASE_URL: postgres://vuxe:vuxe@postgres:5432/vuxe_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: apt-get update && apt-get install -y pkg-config libssl-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      - name: Check formatting
        working-directory: backend
        run: cargo fmt --check

      - name: Clippy
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        working-directory: backend
        run: cargo build --release

      - name: Test
        working-directory: backend
        run: cargo test
        env:
          # Tests don't need auth providers configured
          AUTH_PROVIDER: clerk

  docker:
    name: Docker Image
    runs-on: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vuxe-backend .
