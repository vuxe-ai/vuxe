services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vuxe
      POSTGRES_PASSWORD: vuxe
      POSTGRES_DB: vuxe
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vuxe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://vuxe:vuxe@db:5432/vuxe
      HOST: 0.0.0.0
      PORT: 8080
      AUTH_PROVIDER: ${AUTH_PROVIDER:-clerk}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:-https://api.clerk.com/v1/jwks}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-https://api.clerk.com}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      RUST_LOG: ${RUST_LOG:-info,vuxe_backend=debug}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-secret}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
